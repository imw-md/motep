name: Build sdist and wheels
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pypa/build
        run: python -m pip install build
      - name: Build source distribution
        run: python -m build --sdist --outdir dist .
      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: motep-sdist
          path: dist/*.tar.gz
          retention-days: 5
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_TEST_COMMAND: >-
            python -c "from motep.potentials.mtp.cext import _mtp_cext"
        run: python -m cibuildwheel --output-dir dist
      - name: Upload built wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: motep-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 5
